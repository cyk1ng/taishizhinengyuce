<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配网调度业务量预测系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #0f1923; }
        
        body {
            display: flex;
            flex-direction: column;
        }

        /* ===== 顶部导航栏 ===== */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            padding: 0 24px;
            background: linear-gradient(135deg, #0a1628, #132744);
            border-bottom: 1px solid rgba(0, 180, 255, 0.15);
            flex-shrink: 0;
            z-index: 100;
        }
        .navbar-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #e0f0ff;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .navbar-title .badge {
            font-size: 11px;
            background: rgba(0, 180, 255, 0.15);
            border: 1px solid rgba(0, 180, 255, 0.3);
            color: #4dc9f6;
            padding: 2px 10px;
            border-radius: 10px;
            font-weight: 400;
        }
        .navbar-close {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            cursor: pointer;
            padding: 6px 16px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            background: transparent;
            transition: all 0.2s;
        }
        .navbar-close:hover {
            color: #fff;
            border-color: rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.05);
        }

        /* ===== iframe 容器 ===== */
        .iframe-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        .iframe-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ===== 加载动画 ===== */
        .loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0f1923;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(0, 180, 255, 0.1);
            border-top-color: #00b4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-overlay p {
            margin-top: 16px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }

        /* ===== 错误提示 ===== */
        .error-overlay {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0f1923;
            z-index: 20;
        }
        .error-overlay.show {
            display: flex;
        }
        .error-overlay .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .error-overlay h3 {
            color: #ff6b6b;
            margin-bottom: 8px;
        }
        .error-overlay p {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }
        .error-overlay .retry-btn {
            margin-top: 20px;
            padding: 8px 28px;
            background: rgba(0, 180, 255, 0.15);
            border: 1px solid rgba(0, 180, 255, 0.3);
            color: #4dc9f6;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .error-overlay .retry-btn:hover {
            background: rgba(0, 180, 255, 0.25);
        }
    </style>
</head>
<body>

    <!-- ===== 顶部导航 ===== -->
    <div class="navbar">
        <div class="navbar-title">
            ⚡ 配网调度业务量预测
            <span class="badge">智能辅助</span>
        </div>
        <button class="navbar-close" onclick="closeWindow()">✕ 关闭</button>
    </div>

    <!-- ===== iframe 容器 ===== -->
    <div class="iframe-wrapper">
        <!-- 加载遮罩 -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <p>正在加载调度系统...</p>
        </div>

        <!-- 错误遮罩 -->
        <div class="error-overlay" id="errorOverlay">
            <div class="icon">⚠️</div>
            <h3>无法连接到调度系统</h3>
            <p id="errorMsg">请检查服务是否正常运行</p>
            <button class="retry-btn" onclick="reloadIframe()">重新加载</button>
        </div>

        <!-- 调度系统 iframe -->
        <iframe id="dispatchFrame" 
                src=""
                allow="clipboard-read; clipboard-write"
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups">
        </iframe>
    </div>

    <script>
        // ============================================================
        //  配置区域 —— 按实际部署地址修改
        // ============================================================
        var DISPATCH_URL = (function() {
            // 支持 URL 参数覆盖：?target=http://xxx 或 ?target=/dispatch/
            var params = new URLSearchParams(window.location.search);
            var urlParam = params.get('target');
            if (urlParam) {
                return urlParam;
            }

            var path = window.location.pathname;

            // 如果当前页面 URL 包含 /dispatch/，说明走 nginx 代理
            if (path.indexOf('/dispatch/') === 0) {
                return '/dispatch/';
            }

            // 如果通过 Java 系统访问（如 /doms/aiagent/dispatchembed.html），默认走 nginx 代理
            // 需要在 Java 服务器上配置 nginx 将 /dispatch/ 代理到调度系统
            if (path.indexOf('/doms/') === 0 || path.indexOf('/aiagent/') === 0) {
                return '/dispatch/';
            }

            // 否则直接连接内网地址
            return 'http://10.180.144.249:5000';
        })();

        var iframe = document.getElementById('dispatchFrame');
        var loadingEl = document.getElementById('loadingOverlay');
        var errorEl = document.getElementById('errorOverlay');
        var errorMsgEl = document.getElementById('errorMsg');

        // ============================================================
        //  启动
        // ============================================================
        iframe.src = DISPATCH_URL;

        // iframe 加载完成 → 隐藏 loading
        iframe.onload = function() {
            loadingEl.classList.add('hidden');
            errorEl.classList.remove('show');
        };

        // iframe 加载失败
        iframe.onerror = function() {
            loadingEl.classList.add('hidden');
            errorEl.classList.add('show');
            errorMsgEl.textContent = '无法连接到: ' + DISPATCH_URL;
        };

        // 超时处理（15秒后如果还没加载完成，显示错误）
        setTimeout(function() {
            if (!loadingEl.classList.contains('hidden')) {
                loadingEl.classList.add('hidden');
                errorEl.classList.add('show');
                errorMsgEl.textContent = '连接超时，请检查服务是否已启动: ' + DISPATCH_URL;
            }
        }, 15000);

        // ============================================================
        //  功能函数
        // ============================================================
        function reloadIframe() {
            errorEl.classList.remove('show');
            loadingEl.classList.remove('hidden');
            iframe.src = DISPATCH_URL + '?t=' + Date.now();
        }

        function closeWindow() {
            // 如果是 iframe 嵌入的，通知父页面
            if (window.parent && window.parent !== window) {
                // 可以自定义关闭逻辑，父页面监听这个消息
                window.parent.postMessage({ type: 'closeDispatch' }, '*');
            } else {
                // 直接跳转到 Java 系统首页（按实际修改）
                window.location.href = '/';
            }
        }

        // 接收父页面消息
        window.addEventListener('message', function(e) {
            if (e.data && e.data.type === 'reloadDispatch') {
                reloadIframe();
            }
        });

        console.log('⚡ 调度系统嵌入页面已加载，目标地址:', DISPATCH_URL);
    </script>
</body>
</html>
