<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配网调度业务量预测</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #0f1923; }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <iframe id="dispatchFrame" allow="clipboard-write" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>

    <script>
    // ===== 配置区 =====
    var DISPATCH_URL = (function() {
        // 1. 优先使用 URL 参数 ?target=
        var match = location.search.match(/[?&]target=([^&]+)/);
        if (match) return decodeURIComponent(match[1]);

        var path = window.location.pathname;

        // 2. 通过 /aiagent/dispatch/ 路径判断（Nginx 代理）
        if (path.indexOf('/aiagent/dispatch/') >= 0) {
            return '/aiagent/dispatch/';
        }

        // 3. 通过 /dispatch/ 路径判断
        if (path.indexOf('/dispatch/') >= 0) {
            return '/dispatch/';
        }

        // 4. 本地 localhost 测试
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
            return window.location.origin + '/';
        }

        // 5. 否则直接连接内网地址
        return 'http://10.180.144.249:5000';
    })();

    // 计算 base_path
    var BASE_PATH = '';
    if (DISPATCH_URL.indexOf('/dispatch') >= 0 || DISPATCH_URL.indexOf('/aiagent') >= 0) {
        BASE_PATH = DISPATCH_URL.replace(/\/+$/, '');
    }

    // 拼接 iframe URL（带 base_path 参数）
    var iframeUrl = DISPATCH_URL;
    if (BASE_PATH) {
        iframeUrl += (iframeUrl.indexOf('?') >= 0 ? '&' : '?') + 'base_path=' + encodeURIComponent(BASE_PATH);
    }

    document.getElementById('dispatchFrame').src = iframeUrl;
    console.log('[dispatch-embed] iframe URL:', iframeUrl);
    </script>
</body>
</html>
